<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced 4D Statistical Analyzer</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
}

textarea{
width:90%;
height:120px;
font-size:16px;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
}

.box{
background:#1e293b;
padding:15px;
margin:15px;
border-radius:10px;
}

table{
margin:auto;
border-collapse:collapse;
}

td,th{
border:1px solid #444;
padding:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>4D Advanced Statistical Analyzer</h1>

<p>Masukkan hasil undian (1 baris = 1 hasil)</p>

<textarea id="data"></textarea><br>

<button onclick="analyze()">ANALYZE</button>

<div id="hotcold" class="box"></div>
<div id="position" class="box"></div>
<div id="gap" class="box"></div>
<div id="pattern" class="box"></div>
<div id="prediction" class="box"></div>

</div>

<script>

function analyze(){

let raw = document.getElementById("data").value.trim().split("\n");

let numbers = raw.map(x=>x.trim()).filter(x=>x.length==4);

let digitCount = Array(10).fill(0);

let pos = {
as:Array(10).fill(0),
kop:Array(10).fill(0),
kepala:Array(10).fill(0),
ekor:Array(10).fill(0)
}

numbers.forEach(n=>{

digitCount[n[0]]++
digitCount[n[1]]++
digitCount[n[2]]++
digitCount[n[3]]++

pos.as[n[0]]++
pos.kop[n[1]]++
pos.kepala[n[2]]++
pos.ekor[n[3]]++

})

/* HOT COLD */

let sorted=[...digitCount].map((v,i)=>({digit:i,val:v}))
.sort((a,b)=>b.val-a.val)

let hot = sorted.slice(0,3).map(x=>x.digit)
let cold = sorted.slice(-3).map(x=>x.digit)

document.getElementById("hotcold").innerHTML=

"<h2>HOT DIGIT</h2>"+hot.join(" ") +
"<h2>COLD DIGIT</h2>"+cold.join(" ")

/* POSITION */

let html="<h2>Digit Position</h2><table><tr><th>Digit</th><th>AS</th><th>KOP</th><th>KEPALA</th><th>EKOR</th></tr>"

for(let i=0;i<10;i++){

html+="<tr><td>"+i+"</td><td>"+pos.as[i]+"</td><td>"+pos.kop[i]+"</td><td>"+pos.kepala[i]+"</td><td>"+pos.ekor[i]+"</td></tr>"

}

html+="</table>"

document.getElementById("position").innerHTML=html

/* GAP */

let gap=Array(10).fill(null)

for(let d=0;d<=9;d++){

for(let i=0;i<numbers.length;i++){

if(numbers[i].includes(d)){
gap[d]=i
break
}

}

}

let ghtml="<h2>Digit GAP</h2>"

for(let i=0;i<10;i++){
ghtml+="Digit "+i+" : "+gap[i]+" draw<br>"
}

document.getElementById("gap").innerHTML=ghtml

/* PATTERN */

let odd=0
let even=0

numbers.forEach(n=>{

for(let d of n){

if(d%2==0) even++
else odd++

}

})

document.getElementById("pattern").innerHTML=

"<h2>Odd Even</h2>"+
"Odd : "+odd+"<br>"+
"Even : "+even

/* PREDICTION ENGINE */

let weight=[]

for(let i=0;i<10;i++){

let score = digitCount[i] + (gap[i]==null?5:gap[i])

weight.push({digit:i,score:score})

}

weight.sort((a,b)=>b.score-a.score)

let best = weight.slice(0,6).map(x=>x.digit)

let predictions=[]

for(let a of best)
for(let b of best)
for(let c of best)
for(let d of best){

let num=""+a+b+c+d

predictions.push(num)

}

predictions=predictions.slice(0,20)

document.getElementById("prediction").innerHTML=

"<h2>TOP PREDICTIONS</h2>"+predictions.join("<br>")

}

</script>

</body>
</html>
